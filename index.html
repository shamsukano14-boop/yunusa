<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile IC Application</title>
    <style>
        body { background-color: #0d1321; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        .sticky-header {
            position: sticky;
            top: 0;
            background-color: #0d1321;
            z-index: 1000;
            padding-top: 10px;
            padding-bottom: 20px;
        }
        .contact-info { 
            text-align: center; background-color: #151c2c; padding: 10px; border-radius: 10px; 
            margin-bottom: 15px; border: 1px solid #1e293b; font-size: 16px; color: #34d399; 
            display: flex; justify-content: center; align-items: center; text-decoration: none; font-weight: bold;
        }
        .whatsapp-logo { width: 20px; height: 20px; margin-right: 8px; vertical-align: middle; }
        .header { text-align: center; margin-bottom: 25px; }
        .search-box { width: 85%; padding: 12px; background-color: #1d2436; border: 1px solid #334155; border-radius: 10px; color: white; font-size: 16px; margin: auto; display: block; text-align: center; }
        .ic-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .ic-card { background-color: #151c2c; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1e293b; cursor: pointer; }
        .ic-code-green { color: #34d399; font-size: 18px; margin: 0 0 5px 0; }
        .gb-tag-red { background-color: #1e1b4b; color: #f87171; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; border: 1px solid #312e81; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background-color: #1d2436; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; border: 1px solid #334155; }
        .modal-storage-big { font-size: 40px; font-weight: bold; color: #34d399; display: block; margin-top: 5px; }
        .close-btn { background-color: #818cf8; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <a href="https://wa.me/2349134844487" class="contact-info">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="whatsapp-logo">
            <span>09134844487</span>
        </a>

        <div class="header">
            <h4>Duk mai bukata da cigaba da amfani da wannan application yayi min magana ta WhatsApp ko ta kira domin a taimaka masa.</h4>
            <p><span id="ic-count">0</span> ICs • EMMC / EMCP / UFS</p>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="A tura kawai">
    </div>
    
    <div class="ic-list" id="icContainer"></div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align: center; color: #fff;">Details</h2>
        <div id="modalDetails" style="font-size: 18px; color: #fff; line-height: 1.8; margin-bottom: 20px;"></div>
        <button class="close-btn" onclick="document.getElementById('myModal').style.display='none'">Close</button>
    </div>
</div>

<script>
const icDatabase = [
    { name: "KMFN10012M", brand: "Samsung", size: "8GB" },
];

const icContainer = document.getElementById('icContainer');
const modal = document.getElementById('myModal');
const modalDetails = document.getElementById('modalDetails');
const icCount = document.getElementById('ic-count');

function displayICs(data) {
    icContainer.innerHTML = "";
    icCount.textContent = data.length;
    
    data.forEach(ic => {
        const card = document.createElement('div');
        card.className = 'ic-card';
        card.innerHTML = `<div class="ic-details"><h3 class="ic-code-green">${ic.name}</h3><p>${ic.brand}</p></div><div class="gb-tag-red">${ic.size}</div>`;
        card.onclick = () => {
            modalDetails.innerHTML = `IC Code: <strong>${ic.name}</strong><br>Brand: <strong>${ic.brand}</strong><br>Storage: <span class="modal-storage-big">${ic.size}</span>`;
            modal.style.display = 'flex';
        };
        icContainer.appendChild(card);
    });
}

displayICs(icDatabase.slice(0, 5));

document.getElementById('searchInput').addEventListener('input', (e) => {
    const k = e.target.value.toUpperCase();
    
    if (k.length > 0) {
        displayICs(icDatabase.filter(i => i.name.toUpperCase().includes(k)));
    } else {
        displayICs(icDatabase.slice(0, 5));
    }
});
</script>
</body>
</html>
