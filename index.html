const icContainer = document.getElementById('icContainer');
const modal = document.getElementById('myModal');
const modalDetails = document.getElementById('modalDetails');
const icCount = document.getElementById('ic-count');

function displayICs(data) {
    icContainer.innerHTML = "";
    icCount.textContent = data.length;
    
    data.forEach(ic => {
        const card = document.createElement('div');
        card.className = 'ic-card';
        card.innerHTML = `<div class="ic-details"><h3 class="ic-code-green">${ic.name}</h3><p>${ic.brand}</p></div><div class="gb-tag-red">${ic.size}</div>`;
        card.onclick = () => {
            modalDetails.innerHTML = `IC Code: <strong>${ic.name}</strong><br>Brand: <strong>${ic.brand}</strong><br>Storage: <span class="modal-storage-big">${ic.size}</span>`;
            modal.style.display = 'flex';
        };
        icContainer.appendChild(card);
    });
}

// A nuna wasu ICs guda biyar na farko a kan home screen
displayICs(icDatabase.slice(0, 5));

document.getElementById('searchInput').addEventListener('input', (e) => {
    const k = e.target.value.toUpperCase();
    
    if (k.length > 0) {
        displayICs(icDatabase.filter(i => i.name.toUpperCase().includes(k)));
    } else {
        displayICs(icDatabase.slice(0, 5));
    }
});
